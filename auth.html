<!DOCTYPE html>
<html>
<head>
    <title>Room Music Player - Auth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="auth.css">
    <script src="api.js"></script>
    <script type="module" src="analytics.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-card glass-panel">
        
        <div class="auth-tabs">
            <button id="tab-btn-login" class="auth-tab-btn active" onclick="switchTab('login')">Login</button>
            <button id="tab-btn-register" class="auth-tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login" class="auth-form">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to join the music room</p>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="loginUserId">User ID</label>
                    <input type="text" id="loginUserId" class="input-control" placeholder="Enter your ID" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="input-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary auth-submit-btn">Login</button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="register" class="auth-form" style="display: none;">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join the synchronized listening experience</p>
            </div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="registerUserId">User ID</label>
                    <input type="text" id="registerUserId" class="input-control" placeholder="Choose an ID" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" class="input-control" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="registerConfirm">Confirm Password</label>
                    <input type="password" id="registerConfirm" class="input-control" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn btn-primary auth-submit-btn">Register</button>
            </form>
        </div>

        <div id="message"></div>
    </div>
</div>

<script>
function switchTab(tab) {
    console.log(`🔄 [UI] Switching to tab: ${tab}`);
    
    // Hide all sections
    document.getElementById('login').style.display = 'none';
    document.getElementById('register').style.display = 'none';
    
    // Remove active class from buttons
    document.getElementById('tab-btn-login').classList.remove('active');
    document.getElementById('tab-btn-register').classList.remove('active');
    
    // Show selected section
    document.getElementById(tab).style.display = 'block';
    document.getElementById('tab-btn-' + tab).classList.add('active');
    
    // Clear message
    clearMessage();
}

function showMessage(text, type) {
    console.log(`💬 [UI] Showing message: "${text}" (type: ${type || 'default'})`);
    const messageDiv = document.getElementById('message');
    messageDiv.textContent = text;
}

function clearMessage() {
    console.log('🧹 [UI] Clearing message display');
    const messageDiv = document.getElementById('message');
    messageDiv.textContent = '';
}

function handleLogin(event) {
    event.preventDefault();
    
    const userId = document.getElementById('loginUserId').value;
    const password = document.getElementById('loginPassword').value;
    
    // Validate inputs
    if (!userId || !password) {
        showMessage('Please fill in all fields');
        return;
    }
    
    // Send GET request to login endpoint
    const loginPath = `/auth/login?userId=${encodeURIComponent(userId)}&pass=${encodeURIComponent(password)}`;
    console.log('Sending login request to path:', loginPath);
    
    fetchWithFallback(loginPath, {
        method: 'GET',
        mode: 'cors',
        headers: {
            'Accept': 'application/json',
            'ngrok-skip-browser-warning': 'true'
        }
    })
    .then(response => {
        console.log('Login response status:', response.status, response.statusText);
        if (response.ok) {
            return response.text().then(data => {
                console.log('Login response body:', data);
                return data;
            });
        } else {
            return response.text().then(text => {
                console.error('Login response text:', text);
                throw new Error(`Login failed with status ${response.status}: ${text}`);
            });
        }
    })
    .then(data => {
        showMessage(`Successfully logged in as ${userId}. Redirecting...`);
        
        // Store user info in localStorage
        localStorage.setItem('user', JSON.stringify({ userId, loggedIn: true }));
        
        // Redirect after 2 seconds
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    })
    .catch(error => {
        console.error('Login error:', error);
        showMessage('Login failed. Please check your credentials. ' + error.message);
    });
}

function handleRegister(event) {
    event.preventDefault();
    
    const userId = document.getElementById('registerUserId').value;
    const password = document.getElementById('registerPassword').value;
    const confirm = document.getElementById('registerConfirm').value;
    
    // Validate inputs
    if (!userId || !password || !confirm) {
        showMessage('Please fill in all fields');
        return;
    }
    
    if (password !== confirm) {
        showMessage('Passwords do not match');
        return;
    }
    
    if (password.length < 6) {
        showMessage('Password must be at least 6 characters');
        return;
    }
    
    // Send POST request to register endpoint
    const registerPath = '/auth/register';
    
    console.log('Sending register request to path:', registerPath);
    console.log('Body:', JSON.stringify({ userId, pass: password }));
    
    fetchWithFallback(registerPath, {
        method: 'POST',
        mode: 'cors',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
            'ngrok-skip-browser-warning': 'true'
        },
        body: JSON.stringify({ userId, pass: password })
    })
    .then(response => {
        console.log('Register response status:', response.status, response.statusText);
        if (response.ok) {
            return response.json().then(data => {
                console.log('Register response body:', data);
                return data;
            });
        } else {
            return response.text().then(text => {
                console.error('Register response text:', text);
                throw new Error(`Registration failed with status ${response.status}: ${text}`);
            });
        }
    })
    .then(data => {
        console.log('Register success:', data);
        showMessage(`Account created successfully! Redirecting to login...`);
        
        // Reset form
        event.target.reset();
        
        // Redirect after 2 seconds
        setTimeout(() => {
            switchTab('login');
            clearMessage();
        }, 2000);
    })
    .catch(error => {
        console.error('Registration error:', error);
        showMessage('Registration failed: ' + error.message);
    });
}

</body>
